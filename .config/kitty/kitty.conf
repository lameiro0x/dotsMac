# kitty.conf - terminal principal de macOS + estela de cursor (cursor trail)
# Basada en la antigua config de Alacritty (~/.config/alacritty/alacritty.toml)
# y el tema github_dark_high_contrast.toml. Alacritty queda solo como respaldo.
# NOTA: kitty NO admite comentarios en la misma linea que un valor.

# ---------------------------------------------------------------------------
# Fuente  (alacritty: font.normal.family / font.size)
# bold/italic no estaban definidos en Alacritty -> kitty los deriva solo.
# ---------------------------------------------------------------------------
font_family      Hack Nerd Font Propo
font_size        14.0

# ---------------------------------------------------------------------------
# Ventana  (alacritty: window.*)
# Alacritty padding x=18, y=16 -> kitty: arriba derecha abajo izquierda
# background_blur NO se activa: tu Alacritty no tenia blur (look identico).
# hide_window_decorations no = decorations "full"
# ---------------------------------------------------------------------------
window_padding_width    16 18 16 18
background_opacity      0.7
hide_window_decorations no
remember_window_size    no
initial_window_width     200c
initial_window_height    55c

# ---------------------------------------------------------------------------
# Colores  (github_dark_high_contrast)
# ---------------------------------------------------------------------------
background #0a0c10
foreground #f0f3f6

# Normal (color0..7)
color0  #7a828e
color1  #ff9492
color2  #26cd4d
color3  #f0b72f
color4  #85888c
color5  #cb9eff
color6  #b5bdc9
color7  #d9dee3

# Bright (color8..15)
color8  #9ea7b3
color9  #ffb1af
color10 #4ae168
color11 #f7c843
color12 #91cbff
color13 #cb9eff
color14 #39c5cf
color15 #d9dee3

# ---------------------------------------------------------------------------
# Cursor  (alacritty: colors.cursor + cursor)
# parpadeo activado (a peticion)
# ---------------------------------------------------------------------------
cursor             #f0f3f6
cursor_text_color  #0a0c10
cursor_shape       block
cursor_blink_interval      0.6
cursor_stop_blinking_after 15.0

# ---------------------------------------------------------------------------
# >>> LO UNICO NUEVO: estela del cursor (cursor trail) <<<
# cursor_trail_color: gris suave de tu propia paleta
# ---------------------------------------------------------------------------
cursor_trail                 50
cursor_trail_decay           0.2 0.7
cursor_trail_start_threshold 1
cursor_trail_color           #9ea7b3

# ---------------------------------------------------------------------------
# Keybindings  (alacritty: Shift+Return -> ESC + CR)
# ---------------------------------------------------------------------------
map shift+enter send_text all \x1b\r

# ---------------------------------------------------------------------------
# macOS
# ---------------------------------------------------------------------------
macos_quit_when_last_window_closed yes
